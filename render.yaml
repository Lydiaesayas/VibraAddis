services:
  # Backend Service
  - type: web
    name: vibraaddis-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 15m
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: TELEBIRR_API_KEY
        sync: false
      - key: TELEBIRR_MERCHANT_CODE
        sync: false
      - key: TELEBIRR_SECRET_KEY
        sync: false
      - key: CBE_BIRR_API_KEY
        sync: false
      - key: CBE_BIRR_MERCHANT_ID
        sync: false
      - key: CBE_BIRR_SECRET_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Frontend Service
  - type: static_site
    name: vibraaddis-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://vibraaddis-backend.onrender.com/api
